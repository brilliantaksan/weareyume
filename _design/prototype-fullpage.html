<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yu+Me — A Socratica node in Tokyo</title>
  <meta name="description" content="Yu+Me is a weekend co-working session in Shibuya for makers, dreamers and builders. Part of Socratica." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ---------- Lastik (display) ---------- */
    @font-face {
      font-family: 'Lastik';
      src: url('project/assets/Lastik.woff2') format('woff2'),
           url('project/assets/Lastik.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* ---------- Base ---------- */
    :root {
      --sky:   #a8d8f0;
      --sky-2: #c8e6f4;
      --pink:  #f4b5c4;
      --pink-2:#ffd1dc;
      --mint:  #b9e3b6;
      --mint-2:#d4eed1;
      --peach: #ffcfa3;
      --peach-2:#ffe2c5;

      --hot-pink: #ff3d7a;
      --hot-pink-soft: #ff75a0;

      --ink:   #181410;
      --ink-soft: #4a423a;
      --paper: #fbf9f5;
      --paper-pure: #ffffff;

      --serif: 'Lastik', 'Cormorant Garamond', 'Times New Roman', serif;
      --sans:  'Inter', 'Helvetica Neue', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;

      --maxw: 1280px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: var(--sans);
      color: var(--ink);
      background: var(--paper);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body { cursor: none; }
    @media (hover: none) { body { cursor: auto; } }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; color: inherit; }

    /* ---------- Crayon SVG filter ---------- */
    .crayon-filter-host { position: absolute; width: 0; height: 0; overflow: hidden; }

    /* ---------- Cursor ---------- */
    .crayon-cursor {
      position: fixed;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--hot-pink) 0%, var(--hot-pink-soft) 60%, transparent 75%);
      pointer-events: none;
      z-index: 10000;
      mix-blend-mode: multiply;
      transform: translate(-50%, -50%);
      transition: width .15s, height .15s;
    }
    .crayon-cursor.over-link { width: 44px; height: 44px; opacity: .7; }
    .crayon-trail {
      position: fixed;
      pointer-events: none;
      z-index: 9998;
      border-radius: 50%;
      mix-blend-mode: multiply;
    }

    /* ---------- Floating clouds (hero) ---------- */
    .cloud-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .cloud {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 1;
      will-change: transform;
      mix-blend-mode: multiply;
    }
    .cloud.c1 { animation: drift1 22s ease-in-out infinite alternate; }
    .cloud.c2 { animation: drift2 26s ease-in-out infinite alternate; }
    .cloud.c3 { animation: drift3 30s ease-in-out infinite alternate; }
    .cloud.c4 { animation: drift4 24s ease-in-out infinite alternate; }
    .cloud.c5 { animation: drift5 28s ease-in-out infinite alternate; }

    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(8vw, 4vh) scale(1.08); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-6vw, 6vh) scale(1.12); } }
    @keyframes drift3 { from { transform: translate(0,0) scale(1); } to { transform: translate(4vw, -5vh) scale(1.05); } }
    @keyframes drift4 { from { transform: translate(0,0) scale(1); } to { transform: translate(-5vw,-3vh) scale(1.1); } }
    @keyframes drift5 { from { transform: translate(0,0) scale(1); } to { transform: translate(6vw, 5vh) scale(1.07); } }
    body.no-clouds .cloud { animation: none !important; }

    /* ---------- Typography ---------- */
    .serif { font-family: var(--serif); font-weight: 400; }
    .sans  { font-family: var(--sans); }
    .tag-jp { font-family: var(--sans); letter-spacing: .04em; }
    .eyebrow {
      font-family: var(--sans);
      font-size: 13px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .h-display {
      font-family: var(--serif);
      font-weight: 400;
      line-height: .92;
      letter-spacing: -.025em;
    }
    .h-section {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(40px, 6vw, 84px);
      line-height: .95;
      letter-spacing: -.02em;
      margin: 0;
    }

    /* ---------- Layout ---------- */
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 32px; }
    @media (max-width: 700px) { .wrap { padding: 0 20px; } }

    section { position: relative; }
    .section-pad { padding: clamp(80px, 12vw, 160px) 0; }

    .divider-jp {
      display: inline-flex; align-items: center; gap: 14px;
      font-size: 12px; letter-spacing: .2em;
      color: var(--ink-soft); text-transform: uppercase;
    }
    .divider-jp::before, .divider-jp::after {
      content: ""; width: 28px; height: 1px; background: currentColor; opacity: .4;
    }

    /* ---------- Pill buttons ---------- */
    .pill {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 24px;
      border-radius: 999px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: .01em;
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
      transition: transform .2s ease, background .2s ease;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }
    .pill:hover { transform: translateY(-2px); background: var(--hot-pink); border-color: var(--hot-pink); }
    .pill.ghost { background: transparent; color: var(--ink); }
    .pill.ghost:hover { background: var(--ink); color: var(--paper); }
    .pill .arrow { display: inline-block; transition: transform .2s; }
    .pill:hover .arrow { transform: translateX(4px); }

    /* ---------- Sticky note card ---------- */
    .note {
      background: var(--paper-pure);
      border-radius: 4px;
      padding: 24px;
      box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 12px 30px -18px rgba(0,0,0,.25);
      transition: transform .25s ease, box-shadow .25s ease;
      position: relative;
    }
    .note:hover {
      transform: rotate(-1.2deg) translateY(-4px);
      box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 20px 40px -18px rgba(0,0,0,.35);
    }
    .note.pink   { background: #fff0f5; }
    .note.sky    { background: #eaf6fc; }
    .note.mint   { background: #effbe8; }
    .note.peach  { background: #fff2e0; }

    .note .tape {
      position: absolute;
      width: 70px; height: 18px;
      background: rgba(255, 230, 100, .55);
      top: -10px; left: 50%; transform: translateX(-50%) rotate(-3deg);
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
    }

    /* ---------- Gallery photo ---------- */
    .photo {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #d8e9f2, #f6dce4);
      aspect-ratio: 3/4;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      transition: transform .35s ease, box-shadow .35s ease;
      box-shadow: 0 8px 24px -12px rgba(0,0,0,.25);
    }
    .photo:hover {
      transform: rotate(var(--tilt, -2deg)) scale(1.02);
      box-shadow: 0 16px 40px -16px rgba(0,0,0,.4);
    }
    .photo .placeholder {
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.4) 0 2px, transparent 2px 16px);
      display: grid; place-items: center;
      color: var(--ink);
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 11px;
      letter-spacing: .1em;
    }

    /* ---------- Marquee ---------- */
    .marquee {
      overflow: hidden;
      border-top: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink);
      background: var(--paper);
      padding: 22px 0;
    }
    .marquee .track {
      display: inline-flex;
      white-space: nowrap;
      animation: marquee 35s linear infinite;
      gap: 56px;
      padding-left: 56px;
    }
    .marquee .item {
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: -.01em;
      display: inline-flex; align-items: center; gap: 56px;
    }
    .marquee .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--hot-pink); display: inline-block; }
    @keyframes marquee { to { transform: translateX(-50%); } }

    /* ---------- FAQ ---------- */
    .faq-item { border-bottom: 1px solid rgba(24,20,16,.15); }
    .faq-q {
      width: 100%;
      background: transparent;
      border: none;
      padding: 28px 0;
      display: flex; justify-content: space-between; align-items: center; gap: 24px;
      font-family: var(--serif);
      font-size: clamp(22px, 2.4vw, 30px);
      text-align: left;
      cursor: pointer;
      color: inherit;
    }
    .faq-q .chev { font-family: var(--sans); font-size: 24px; transition: transform .25s; color: var(--hot-pink); }
    .faq-item.open .faq-q .chev { transform: rotate(45deg); }
    .faq-a {
      max-height: 0; overflow: hidden;
      transition: max-height .35s ease;
      font-size: 17px;
      line-height: 1.55;
      color: var(--ink-soft);
    }
    .faq-item.open .faq-a { max-height: 400px; }
    .faq-a-inner { padding: 0 0 28px 0; max-width: 60ch; }

    /* ---------- Scribble draw-on-scroll ---------- */
    .scribble {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }
    .scribble svg { overflow: visible; }
    .scribble path, .scribble line, .scribble polyline, .scribble circle {
      stroke-dasharray: var(--len, 1000);
      stroke-dashoffset: var(--len, 1000);
      transition: stroke-dashoffset 1.2s ease-out;
    }
    .scribble.drawn path, .scribble.drawn line, .scribble.drawn polyline, .scribble.drawn circle {
      stroke-dashoffset: 0;
    }

    /* ---------- Section: gradient bleed ---------- */
    .gradient-section {
      background:
        radial-gradient(60% 50% at 20% 30%, rgba(168,216,240,.85), transparent 70%),
        radial-gradient(50% 45% at 80% 25%, rgba(244,181,196,.8), transparent 70%),
        radial-gradient(55% 60% at 70% 80%, rgba(185,227,182,.7), transparent 70%),
        radial-gradient(45% 55% at 25% 80%, rgba(255,207,163,.7), transparent 70%),
        var(--paper);
      position: relative;
    }
    .gradient-section::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(120% 80% at 50% 50%, transparent 40%, var(--paper) 95%);
      pointer-events: none;
    }

    /* ---------- Tape ---------- */
    .tape-tag {
      position: absolute;
      font-family: var(--serif);
      font-size: 14px;
      color: var(--hot-pink);
      transform: rotate(-6deg);
    }

    /* ---------- Footer ---------- */
    footer {
      background: var(--ink);
      color: var(--paper);
      padding: 80px 0 40px;
      margin-top: 80px;
      position: relative;
      overflow: hidden;
    }
    footer a:hover { color: var(--hot-pink-soft); }

    /* ---------- Misc helpers ---------- */
    .no-cursor-hide { cursor: pointer; }
    .text-pink { color: var(--hot-pink); }
    .text-ink-soft { color: var(--ink-soft); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
    @media (max-width: 900px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }

    /* ---------- Selection ---------- */
    ::selection { background: var(--hot-pink); color: var(--paper); }

    /* ---------- Scribble density ---------- */
    body[data-scribble-density="minimal"] .scribble:nth-of-type(2n) { display: none; }
    body[data-scribble-density="minimal"] .scribble:nth-of-type(3n) { display: none; }
    body[data-scribble-density="lots"] .scribble { opacity: 1; }
    body[data-scribble-density="regular"] .scribble { opacity: .95; }
  </style>
</head>
<body>

  <script type="text/babel">

    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
        window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = React.useState(false);
      const dragRef = React.useRef(null);
      const offsetRef = React.useRef({ x: 16, y: 16 });
      const PAD = 16;

      const clampToViewport = React.useCallback(() => {
        const panel = dragRef.current;
        if (!panel) return;
        const w = panel.offsetWidth, h = panel.offsetHeight;
        const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
        const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
        offsetRef.current = {
          x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
          y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
        };
        panel.style.right = offsetRef.current.x + 'px';
        panel.style.bottom = offsetRef.current.y + 'px';
      }, []);

      React.useEffect(() => {
        if (!open) return;
        clampToViewport();
        if (typeof ResizeObserver === 'undefined') {
          window.addEventListener('resize', clampToViewport);
          return () => window.removeEventListener('resize', clampToViewport);
        }
        const ro = new ResizeObserver(clampToViewport);
        ro.observe(document.documentElement);
        return () => ro.disconnect();
      }, [open, clampToViewport]);

      React.useEffect(() => {
        const onMsg = (e) => {
          const t = e?.data?.type;
          if (t === '__activate_edit_mode') setOpen(true);
          else if (t === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dismiss = () => {
        setOpen(false);
        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
      };

      const onDragStart = (e) => {
        const panel = dragRef.current;
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight = window.innerWidth - r.right;
        const startBottom = window.innerHeight - r.bottom;
        const move = (ev) => {
          offsetRef.current = {
            x: startRight - (ev.clientX - sx),
            y: startBottom - (ev.clientY - sy),
          };
          clampToViewport();
        };
        const up = () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      if (!open) return null;
      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd" onMouseDown={onDragStart}>
              <b>{title}</b>
              <button className="twk-x" aria-label="Close tweaks"
                      onMouseDown={(e) => e.stopPropagation()}

            </div>
            <div className="twk-body">{children}</div>
          </div>
        </>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = React.useRef(null);
      const [dragging, setDragging] = React.useState(false);
      const valueRef = React.useRef(value);
      valueRef.current = value;

      const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
      const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
      const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
      if (!fitsAsSegments) {
        const resolve = (s) => {
          const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
          return m === undefined ? s : typeof m === 'object' ? m.value : m;
        };
        return <TweakSelect label={label} value={value} options={options}
                            onChange={(s) => onChange(resolve(s))} />;
      }
      const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
      const idx = Math.max(0, opts.findIndex((o) => o.value === value));
      const n = opts.length;

      const segAt = (clientX) => {
        const r = trackRef.current.getBoundingClientRect();
        const inner = r.width - 4;
        const i = Math.floor(((clientX - r.left - 2) / inner) * n);
        return opts[Math.max(0, Math.min(n - 1, i))].value;
      };

      const onPointerDown = (e) => {
        setDragging(true);
        const v0 = segAt(e.clientX);
        if (v0 !== valueRef.current) onChange(v0);
        const move = (ev) => {
          if (!trackRef.current) return;
          const v = segAt(ev.clientX);
          if (v !== valueRef.current) onChange(v);
        };
        const up = () => {
          setDragging(false);
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };

      return (
        <TweakRow label={label}>
          <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
               className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
            <div className="twk-seg-thumb"
                 style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                          width: `calc((100% - 4px) / ${n})` }} />
            {opts.map((o) => (
              <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
                {o.label}
              </button>
            ))}
          </div>
        </TweakRow>
      );
    }

    function __twkIsLight(hex) {
      const h = String(hex).replace('#', '');
      const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
      const n = parseInt(x.slice(0, 6), 16);
      if (Number.isNaN(n)) return true;
      const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
      return r * 299 + g * 587 + b * 114 > 148000;
    }

    /* ═══════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════ */
    function CrayonCursor() {
      React.useEffect(() => {
        if (window.matchMedia("(hover: none)").matches) return;
        const cursor = document.createElement("div");
        cursor.className = "crayon-cursor";
        document.body.appendChild(cursor);

        const trail = [];
        const TRAIL_LEN = 14;
        const COLORS = [
          "rgba(168,216,240,.55)",
          "rgba(244,181,196,.55)",
          "rgba(185,227,182,.55)",
          "rgba(255,207,163,.55)",
          "rgba(255,61,122,.45)",
        ];
        for (let i = 0; i < TRAIL_LEN; i++) {
          const t = document.createElement("div");
          t.className = "crayon-trail";
          const size = 8 + Math.random() * 14;
          t.style.width = t.style.height = size + "px";
          t.style.background = `radial-gradient(circle, ${COLORS[i % COLORS.length]} 0%, transparent 70%)`;
          t.style.filter = "blur(2px)";
          document.body.appendChild(t);
          trail.push({ el: t, x: 0, y: 0, life: 0 });
        }

        let mx = window.innerWidth / 2, my = window.innerHeight / 2;
        let cx = mx, cy = my;
        let lastDrop = 0;
        let trailIdx = 0;

        const onMove = (e) => {
          mx = e.clientX; my = e.clientY;
          const tgt = e.target;
          const isInteractive = tgt.closest('a, button, .pill, .faq-q, .photo');
          cursor.classList.toggle('over-link', !!isInteractive);
        };
        window.addEventListener("mousemove", onMove);

        let raf;
        const tick = (now) => {
          cx += (mx - cx) * 0.35;
          cy += (my - cy) * 0.35;
          cursor.style.left = cx + "px";
          cursor.style.top = cy + "px";

          if (now - lastDrop > 35) {
            lastDrop = now;
            const t = trail[trailIdx];
            trailIdx = (trailIdx + 1) % TRAIL_LEN;
            t.el.style.left = (mx + (Math.random() - 0.5) * 10) + "px";
            t.el.style.top  = (my + (Math.random() - 0.5) * 10) + "px";
            t.el.style.opacity = "0.9";
            t.el.style.transition = "none";
            requestAnimationFrame(() => {
              t.el.style.transition = "opacity 1.2s ease-out, transform 1.2s ease-out";
              t.el.style.opacity = "0";
              t.el.style.transform = `translate(-50%,-50%) scale(${0.4 + Math.random()*0.5})`;
            });
          }

          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener("mousemove", onMove);
          cursor.remove();
          trail.forEach(t => t.el.remove());
        };
      }, []);
      return null;
    }

    function ScribbleObserver() {
      React.useEffect(() => {
        const els = document.querySelectorAll('.scribble');
        els.forEach(s => {
          s.querySelectorAll('path, line, polyline, circle').forEach(p => {
            try {
              const len = p.getTotalLength ? p.getTotalLength() : 600;
              p.style.setProperty('--len', Math.ceil(len + 20));
            } catch (e) {}
          });
        });
        const io = new IntersectionObserver((entries) => {
          entries.forEach(en => {
            if (en.isIntersecting) en.target.classList.add('drawn');
          });
        }, { rootMargin: "0px 0px -10% 0px", threshold: 0.1 });
        els.forEach(s => io.observe(s));
        return () => io.disconnect();
      }, []);
      return null;
    }

            <div className="cloud" style={{ width: "35vw", height: "35vw", right: "20%", top: "20%",
              background: "radial-gradient(circle, var(--mint) 0%, transparent 70%)" }} />
          </div>
          <div className="wrap" style={{ position: "relative", zIndex: 2 }}>
            <div className="join-inner">
              <div className="scribble" style={{ top: "-30px", right: "10%" }}>
                <StarScribble size={70} color="#fff" />
              </div>
              <div className="scribble" style={{ bottom: "-30px", left: "10%" }}>
                <SwirlScribble size={120} color="#fff" />
              </div>
              <span className="eyebrow" style={{ color: "var(--ink)" }}>RSVP · 申し込み</span>
              <h2 className="h-display join-title">
                See you<br />Saturday?
              </h2>
              <p className="join-sub">
                {NEXT.dateLabel} · {NEXT.timeLabel} · {NEXT.locationLabel}
              </p>
              <a href="https://luma.com/YuMe" className="pill" style={{ marginTop: 28 }}>
                RSVP on Luma <span className="arrow">→</span>
              </a>
              <div className="join-or">or — <a href="mailto:hello@weareyume.com" className="text-pink" style={{ borderBottom: "1px solid currentColor" }}>get a friendly email reminder</a></div>
            </div>
          </div>
          <style>{`
            .join-section { padding: 140px 0; position: relative; overflow: hidden; min-height: 80vh; display: flex; align-items: center; }
            .join-inner { text-align: center; max-width: 760px; margin: 0 auto; position: relative; }
            .join-title { font-size: clamp(72px, 12vw, 180px); margin: 16px 0 24px; }
            .join-sub { font-size: 20px; color: var(--ink); margin: 0 auto; max-width: 460px; line-height: 1.4; }
            .join-or { margin-top: 20px; font-size: 14px; color: var(--ink-soft); }
          `}</style>
        </section>
      );
    }

    function Footer() {
      return (
        <footer>
          <div className="wrap">
            <div className="footer-grid">
              <div>
                <div className="footer-mark serif">Yu+Me</div>
                <p className="footer-tag">A Socratica node based in Shibuya, Tokyo.<br />週末 · Weekends · 12:00–15:00</p>
              </div>
              <div>
                <div className="footer-h">Find us</div>
                <ul>
                  <li><a href="https://luma.com/YuMe">Luma</a></li>
                  <li><a href="https://www.instagram.com/weareyume_">Instagram @weareyume_</a></li>
                  <li><a href="https://x.com/yuandmetokyo">X / Twitter</a></li>
                  <li><a href="mailto:hello@weareyume.com">hello@weareyume.com</a></li>
                </ul>
              </div>
              <div>
                <div className="footer-h">Socratica</div>
                <ul>
                  <li><a href="https://socratica.info">socratica.info</a></li>
                  <li><a href="https://socratica.info/map">Find a node near you</a></li>
                  <li><a href="https://toolbox.socratica.info">Host toolbox</a></li>
                </ul>
              </div>
              <div>
                <div className="footer-h">Get reminded</div>
                <p className="footer-tag" style={{ marginBottom: 12 }}>One email per session. Nothing else.</p>
                <form className="footer-form" onSubmit={(e) => { e.preventDefault(); alert("Thanks! We'll be in touch."); }}>
                  <input type="email" placeholder="you@email.com" required />
                  <button type="submit">→</button>
                </form>
              </div>
            </div>
            <div className="footer-bottom">
              <span>© 2025 Yu+Me · Made with ❤ in 渋谷</span>
              <span>A Socratica node. The spark continues.</span>
            </div>
          </div>
          <style>{`
            .footer-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1.2fr; gap: 48px; padding-bottom: 64px; border-bottom: 1px solid rgba(255,255,255,.15); }
            @media (max-width: 900px) { .footer-grid { grid-template-columns: 1fr 1fr; } }
            @media (max-width: 600px) { .footer-grid { grid-template-columns: 1fr; } }
            .footer-mark { font-size: 56px; line-height: 1; }
            .footer-tag { font-size: 14px; color: rgba(255,255,255,.65); margin-top: 12px; line-height: 1.5; }
            .footer-h { font-size: 12px; letter-spacing: .18em; text-transform: uppercase; color: var(--hot-pink-soft); margin-bottom: 16px; }
            footer ul { list-style: none; padding: 0; margin: 0; }
            footer li { margin-bottom: 10px; font-size: 15px; }
            .footer-form { display: flex; border-bottom: 1px solid rgba(255,255,255,.3); padding-bottom: 8px; }
            .footer-form input { flex: 1; background: transparent; border: none; color: white; padding: 8px 0; font-family: var(--sans); font-size: 14px; outline: none; }
            .footer-form input::placeholder { color: rgba(255,255,255,.4); }
            .footer-form button { background: transparent; border: none; color: var(--hot-pink-soft); font-size: 18px; cursor: pointer; }
            .footer-bottom { display: flex; justify-content: space-between; padding-top: 32px; font-size: 12px; color: rgba(255,255,255,.4); flex-wrap: wrap; gap: 16px; }
          `}</style>
        </footer>
      );
    }

    /* ═══════════════════════════════════════════════════════
       APP
    ═══════════════════════════════════════════════════════ */
    const TWEAK_DEFAULTS = {
      "heroVariant": "A",
      "accentColor": "#ff3d7a",
      "scribbleDensity": "regular",
      "showCursor": true,
      "showClouds": true
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        const p = new URLSearchParams(window.location.search).get('hero');
        if (p === 'A' || p === 'B') setTweak('heroVariant', p);
      }, []);

      const heroOnly = new URLSearchParams(window.location.search).get('heroOnly') === '1';

      React.useEffect(() => {
        document.documentElement.style.setProperty('--hot-pink', t.accentColor);
      }, [t.accentColor]);

      React.useEffect(() => {
        document.body.style.cursor = t.showCursor ? 'none' : 'auto';
      }, [t.showCursor]);

      React.useEffect(() => {
        document.body.dataset.scribbleDensity = t.scribbleDensity;
      }, [t.scribbleDensity]);

      React.useEffect(() => {
        document.body.classList.toggle('no-clouds', !t.showClouds);
      }, [t.showClouds]);

      return (
        <>
          <CrayonFilterHost />
          {t.showCursor && <CrayonCursor />}
          <ScribbleObserver />

          {!heroOnly && <Nav />}

          <main>
            {t.heroVariant === "A" ? <HeroA next={NEXT} /> : <HeroB next={NEXT} />}
            {!heroOnly && <>
              <Manifesto />
              <HowItWorks />
              <Upcoming />
              <Demos />
              <Gallery />
              <FAQ />
              <JoinCTA />
            </>}
          </main>
          {!heroOnly && <Footer />}

          <TweaksPanel title="Yu+Me · Tweaks">
            <TweakSection label="Hero" />
            <TweakRadio
              label="Hero variant"
              value={t.heroVariant}
              options={["A", "B"]}
              onChange={(v) => setTweak('heroVariant', v)}
            />
            <p style={{ fontSize: 11, color: '#888', margin: '4px 0 12px', lineHeight: 1.4 }}>
              <strong>A</strong> — centered logo card · <strong>B</strong> — editorial spread w/ collage
            </p>

            <TweakSection label="Look" />
            <TweakColor
              label="Accent color"
              value={t.accentColor}
              options={['#ff3d7a', '#e91e63', '#7c3aed', '#0ea5e9', '#f97316']}
              onChange={(v) => setTweak('accentColor', v)}
            />
            <TweakRadio
              label="Scribble density"
              value={t.scribbleDensity}
              options={['minimal', 'regular', 'lots']}
              onChange={(v) => setTweak('scribbleDensity', v)}
            />

            <TweakSection label="Effects" />
            <TweakToggle
              label="Crayon cursor"
              value={t.showCursor}
              onChange={(v) => setTweak('showCursor', v)}
            />
            <TweakToggle
              label="Floating clouds"
              value={t.showClouds}
              onChange={(v) => setTweak('showClouds', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
